<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Quiz - Your Strong Ministry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        :root {
            --bg-dark: #081226;
            --text-main: #ffffff;
            --text-soft: rgba(255,255,255,0.88);
            --text-muted: rgba(255,255,255,0.74);
            --card-bg: rgba(255,255,255,0.11);
            --card-border: rgba(255,255,255,0.18);
            --card-soft: rgba(255,255,255,0.08);
            --white: #ffffff;
            --blue-dark: #16324f;
            --danger: #ff6464;
            --success: #33c37d;
            --warning: #ffb84d;
            --info: #8bd3ff;
            --shadow: 0 18px 45px rgba(0,0,0,0.25);
        }

        body {
            min-height: 100vh;
            color: var(--text-main);
            background: linear-gradient(rgba(8,18,38,0.72), rgba(8,18,38,0.88)), url("https://images.unsplash.com/photo-1504052434569-70ad5836ab65?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
            padding: 18px;
            overflow-x: hidden;
            position: relative;
        }

        .bg-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(95px);
            opacity: 0.22;
            pointer-events: none;
            animation: floatGlow 10s ease-in-out infinite;
            z-index: 0;
        }

            .bg-glow.one {
                width: 260px;
                height: 260px;
                background: rgba(255,255,255,0.20);
                top: 4%;
                left: 4%;
            }

            .bg-glow.two {
                width: 320px;
                height: 320px;
                background: rgba(173,216,255,0.14);
                right: 4%;
                bottom: 4%;
                animation-delay: 2s;
            }

        .page {
            max-width: 1280px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            animation: pageEnter 0.8s ease;
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 24px;
            padding: 22px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            margin-bottom: 18px;
        }

            .glass-card::before {
                content: "";
                position: absolute;
                width: 220px;
                height: 220px;
                border-radius: 50%;
                background: radial-gradient(rgba(255,255,255,0.10), transparent 70%);
                top: -90px;
                right: -90px;
                pointer-events: none;
            }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .brand {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 0.6px;
        }

        .top-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            border-radius: 14px;
            padding: 11px 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease, background 0.25s ease;
            box-shadow: 0 8px 18px rgba(0,0,0,0.12);
        }

            .btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 12px 24px rgba(0,0,0,0.18);
            }

            .btn:active {
                transform: translateY(0);
            }

            .btn:disabled {
                opacity: 0.65;
                cursor: not-allowed;
                transform: none;
                box-shadow: none;
            }

        .btn-light {
            background: white;
            color: var(--blue-dark);
        }

        .btn-outline {
            background: rgba(255,255,255,0.10);
            border: 1px solid rgba(255,255,255,0.18);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-green {
            background: #ffffff;
            color: var(--blue-dark);
        }

        .btn-score {
            background: #dff3ff;
            color: var(--blue-dark);
        }

        .section-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .full {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: rgba(255,255,255,0.92);
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.16);
            outline: none;
            background: rgba(255,255,255,0.94);
            color: var(--blue-dark);
            font-size: 14px;
            transition: box-shadow 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
        }

            input:focus, textarea:focus, select:focus {
                border-color: rgba(173,216,255,0.65);
                box-shadow: 0 0 0 4px rgba(173,216,255,0.18);
            }

        textarea {
            min-height: 90px;
            resize: vertical;
        }

        .quiz-list,
        .question-list,
        .score-list {
            display: grid;
            gap: 14px;
        }

        .quiz-card,
        .question-card,
        .score-card {
            background: var(--card-soft);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 18px;
            padding: 18px;
            animation: cardPop 0.35s ease;
        }

        .quiz-head,
        .question-head,
        .score-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .quiz-title {
            font-size: 20px;
            font-weight: bold;
        }

        .quiz-sub {
            font-size: 13px;
            color: rgba(255,255,255,0.82);
            line-height: 1.6;
            margin-top: 6px;
        }

        .quiz-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .question-number,
        .score-title {
            font-size: 18px;
            font-weight: bold;
        }

        .question-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .option-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

            .option-row input[type="text"] {
                flex: 1;
            }

        .option-check {
            width: auto !important;
            transform: scale(1.15);
        }

        .check-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            white-space: nowrap;
            font-size: 14px;
            margin: 0;
        }

        .score-meta {
            font-size: 14px;
            line-height: 1.8;
            color: rgba(255,255,255,0.92);
        }

        .loading-overlay,
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(3, 10, 24, 0.62);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s ease;
        }

            .loading-overlay.show,
            .modal-overlay.show {
                opacity: 1;
                visibility: visible;
            }

        .loading-box,
        .modal-box {
            width: 100%;
            max-width: 380px;
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.18);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 24px;
            padding: 26px 20px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.28);
            transform: translateY(18px) scale(0.96);
            transition: 0.28s ease;
        }

        .loading-overlay.show .loading-box,
        .modal-overlay.show .modal-box {
            transform: translateY(0) scale(1);
        }

        .loading-spinner {
            width: 68px;
            height: 68px;
            margin: 0 auto 16px;
            position: relative;
        }

        .ring1, .ring2 {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.16);
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        .ring2 {
            inset: 9px;
            animation-direction: reverse;
            animation-duration: 1.4s;
            border-top-color: rgba(173,216,255,0.95);
        }

        .cross {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            animation: gentlePulse 1.6s ease-in-out infinite;
        }

        .loading-title,
        .modal-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .loading-text,
        .modal-text {
            font-size: 14px;
            color: rgba(255,255,255,0.88);
            line-height: 1.7;
        }

        .modal-icon {
            width: 74px;
            height: 74px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            margin: 0 auto 16px;
            font-size: 32px;
            color: white;
            position: relative;
            animation: iconBounce 0.5s ease;
        }

            .modal-icon.success {
                background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), rgba(51,195,125,0.95));
                box-shadow: 0 0 0 10px rgba(51,195,125,0.12);
            }

            .modal-icon.error {
                background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), rgba(255,100,100,0.95));
                box-shadow: 0 0 0 10px rgba(255,100,100,0.12);
            }

            .modal-icon.info {
                background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), rgba(92,176,255,0.95));
                box-shadow: 0 0 0 10px rgba(92,176,255,0.12);
            }

            .modal-icon.warning {
                background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), rgba(255,184,77,0.95));
                box-shadow: 0 0 0 10px rgba(255,184,77,0.12);
            }

        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 18px;
        }

        .toast-wrap {
            position: fixed;
            top: 18px;
            right: 18px;
            z-index: 10000;
            display: grid;
            gap: 10px;
            width: min(92vw, 360px);
        }

        .toast {
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.18);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            color: white;
            border-radius: 18px;
            padding: 14px 14px 14px 16px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            box-shadow: 0 18px 38px rgba(0,0,0,0.28);
            transform: translateX(30px);
            opacity: 0;
            animation: toastIn 0.35s ease forwards;
            position: relative;
            overflow: hidden;
        }

            .toast::after {
                content: "";
                position: absolute;
                left: 0;
                bottom: 0;
                height: 3px;
                width: 100%;
                background: rgba(255,255,255,0.3);
                animation: toastBar linear forwards;
            }

            .toast.success::after {
                background: rgba(51,195,125,0.95);
            }

            .toast.error::after {
                background: rgba(255,100,100,0.95);
            }

            .toast.info::after {
                background: rgba(92,176,255,0.95);
            }

            .toast.warning::after {
                background: rgba(255,184,77,0.95);
            }

        .toast-icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            flex-shrink: 0;
            font-size: 18px;
            background: rgba(255,255,255,0.14);
        }

        .toast-body {
            flex: 1;
        }

        .toast-title {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .toast-text {
            font-size: 13px;
            line-height: 1.5;
            color: rgba(255,255,255,0.9);
        }

        .toast-close {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.85);
            font-size: 18px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .hidden {
            display: none !important;
        }

        @keyframes pageEnter {
            from {
                opacity: 0;
                transform: translateY(24px) scale(0.985);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes floatGlow {
            0%,100% {
                transform: translate(0,0) scale(1);
            }

            50% {
                transform: translate(14px,-18px) scale(1.05);
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes gentlePulse {
            0%,100% {
                transform: scale(1);
                opacity: 0.84;
            }

            50% {
                transform: scale(1.08);
                opacity: 1;
            }
        }

        @keyframes cardPop {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.985);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes iconBounce {
            0% {
                transform: scale(0.7);
                opacity: 0;
            }

            60% {
                transform: scale(1.08);
                opacity: 1;
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(30px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateX(0) scale(1);
            }

            to {
                opacity: 0;
                transform: translateX(28px) scale(0.96);
            }
        }

        @keyframes toastBar {
            from {
                width: 100%;
            }

            to {
                width: 0%;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 14px;
            }

            .brand {
                font-size: 24px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .glass-card {
                padding: 18px 14px;
                border-radius: 20px;
            }

            .section-title {
                font-size: 20px;
            }

            .option-row {
                flex-direction: column;
                align-items: stretch;
            }

            .check-wrap {
                white-space: normal;
            }

            .toast-wrap {
                top: auto;
                bottom: 16px;
                right: 14px;
                left: 14px;
                width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="bg-glow one"></div>
    <div class="bg-glow two"></div>

    <div class="page">
        <div class="topbar">
            <div class="brand">Admin Quiz Management</div>
            <div class="top-actions">
                <button class="btn btn-outline" onclick="goBackDashboard()">Back Dashboard</button>
                <button class="btn btn-light" onclick="logoutAdmin()">Logout</button>
            </div>
        </div>

        <div class="glass-card">
            <div class="section-title">Create Quiz</div>

            <div class="grid">
                <div>
                    <label for="quizTitle">Quiz Title</label>
                    <input type="text" id="quizTitle" placeholder="Enter quiz title">
                </div>

                <div>
                    <label for="quizStatus">Status</label>
                    <select id="quizStatus">
                        <option value="Draft">Draft</option>
                        <option value="Published">Published</option>
                    </select>
                </div>

                <div class="full">
                    <label for="quizDescription">Description</label>
                    <textarea id="quizDescription" placeholder="Enter quiz description"></textarea>
                </div>
            </div>

            <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
                <button class="btn btn-green" onclick="createQuiz()">Create Quiz</button>
                <button class="btn btn-outline" onclick="clearQuizForm()">Clear</button>
            </div>
        </div>

        <div class="glass-card">
            <div class="section-title">Existing Quizzes</div>
            <div class="quiz-list" id="quizList">
                <div class="quiz-card">Loading quizzes...</div>
            </div>
        </div>

        <div class="glass-card hidden" id="questionSection">
            <div class="section-title" id="questionSectionTitle">Manage Questions</div>

            <div style="margin-bottom:16px; display:flex; gap:10px; flex-wrap:wrap;">
                <button class="btn btn-green" onclick="addQuestion()">+ Add Question</button>
                <button class="btn btn-light" onclick="saveQuestions()">Save Questions</button>
                <button class="btn btn-outline" onclick="publishActiveQuiz()">Publish Quiz</button>
            </div>

            <div class="question-list" id="questionList"></div>
        </div>

        <div class="glass-card hidden" id="scoreSection">
            <div class="section-title" id="scoreSectionTitle">Quiz Scores</div>
            <div class="score-list" id="scoreList"></div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-box">
            <div class="loading-spinner">
                <div class="ring1"></div>
                <div class="ring2"></div>
                <div class="cross">✝</div>
            </div>
            <div class="loading-title">Please Wait</div>
            <div class="loading-text" id="loadingText">Loading quiz data...</div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <div class="modal-icon info" id="modalIcon">ℹ</div>
            <div class="modal-title" id="modalTitle">Notice</div>
            <div class="modal-text" id="modalText">Message goes here.</div>
            <div class="modal-actions" id="modalActions"></div>
        </div>
    </div>

    <div class="toast-wrap" id="toastWrap"></div>

    <script>
      
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxCNL-3svzyaA5oQYa36jfJlTwoorHB36DDJmeG2awiwhclEPElAE2iW-kHagBfKj_V-g/exec";

        const urlParams = new URLSearchParams(window.location.search);
        let adminToken = urlParams.get("token") || sessionStorage.getItem("adminToken") || "";

        let quizzes = [];
        let activeQuizId = "";
        let activeQuizTitle = "";

        const loadingOverlay = document.getElementById("loadingOverlay");
        const loadingText = document.getElementById("loadingText");
        const quizList = document.getElementById("quizList");
        const questionList = document.getElementById("questionList");
        const questionSection = document.getElementById("questionSection");
        const questionSectionTitle = document.getElementById("questionSectionTitle");
        const scoreSection = document.getElementById("scoreSection");
        const scoreSectionTitle = document.getElementById("scoreSectionTitle");
        const scoreList = document.getElementById("scoreList");

        const modalOverlay = document.getElementById("modalOverlay");
        const modalIcon = document.getElementById("modalIcon");
        const modalTitle = document.getElementById("modalTitle");
        const modalText = document.getElementById("modalText");
        const modalActions = document.getElementById("modalActions");
        const toastWrap = document.getElementById("toastWrap");

        function goBackDashboard() {
            window.location.href = "admin-panel.html";
        }

        async function logoutAdmin() {
            const ok = await showConfirm({
                title: "Logout",
                message: "Are you sure you want to logout from the admin panel?",
                confirmText: "Yes, Logout",
                cancelText: "Cancel",
                type: "warning"
            });

            if (!ok) return;

            sessionStorage.removeItem("adminToken");
            window.location.href = "admin-panel.html";
        }

        function showLoading(text = "Please wait...") {
            loadingText.textContent = text;
            loadingOverlay.classList.add("show");
        }

        function hideLoading() {
            loadingOverlay.classList.remove("show");
        }

        function isValidScriptUrl(url) {
            return typeof url === "string"
                && url.trim() !== ""
                && url !== "PASTE_QUIZ_SCRIPT_URL_HERE"
                && /^https?:\/\//i.test(url);
        }

        async function apiCall(payload) {
            if (!isValidScriptUrl(SCRIPT_URL)) {
                throw new Error("Please replace SCRIPT_URL with your real deployed Apps Script URL.");
            }

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 20000);

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "text/plain;charset=utf-8"
                    },
                    body: JSON.stringify(payload),
                    signal: controller.signal,
                    redirect: "follow",
                    cache: "no-store"
                });

                const rawText = await response.text();

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText || "Request failed"}`);
                }

                if (!rawText) {
                    throw new Error("Empty response from server.");
                }

                let data;
                try {
                    data = JSON.parse(rawText);
                } catch (jsonError) {
                    console.error("Invalid JSON response:", rawText);
                    throw new Error("Server returned an invalid response. Check your Apps Script output.");
                }

                return data;
            } catch (error) {
                if (error.name === "AbortError") {
                    throw new Error("Request timed out. The server took too long to respond.");
                }
                throw error;
            } finally {
                clearTimeout(timeoutId);
            }
        }

        function clearQuizForm() {
            document.getElementById("quizTitle").value = "";
            document.getElementById("quizDescription").value = "";
            document.getElementById("quizStatus").value = "Draft";
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function escapeJsString(text) {
            return String(text || "")
                .replace(/\\/g, "\\\\")
                .replace(/'/g, "\\'")
                .replace(/\n/g, "\\n")
                .replace(/\r/g, "");
        }

        function getModalIcon(type) {
            if (type === "success") return "✓";
            if (type === "error") return "✕";
            if (type === "warning") return "!";
            return "ℹ";
        }

        function showModal({ title = "Notice", message = "", type = "info", actions = [] } = {}) {
            modalIcon.className = `modal-icon ${type}`;
            modalIcon.textContent = getModalIcon(type);
            modalTitle.textContent = title;
            modalText.textContent = message;
            modalActions.innerHTML = "";

            actions.forEach(action => {
                const btn = document.createElement("button");
                btn.className = `btn ${action.className || "btn-light"}`;
                btn.textContent = action.text || "OK";
                btn.onclick = action.onClick;
                modalActions.appendChild(btn);
            });

            modalOverlay.classList.add("show");
        }

        function closeModal() {
            modalOverlay.classList.remove("show");
        }

        function showAlert({
            title = "Notice",
            message = "",
            type = "info",
            buttonText = "OK"
        } = {}) {
            return new Promise(resolve => {
                showModal({
                    title,
                    message,
                    type,
                    actions: [
                        {
                            text: buttonText,
                            className: "btn-light",
                            onClick: () => {
                                closeModal();
                                resolve(true);
                            }
                        }
                    ]
                });
            });
        }

        function showConfirm({
            title = "Confirm",
            message = "Are you sure?",
            type = "warning",
            confirmText = "Yes",
            cancelText = "Cancel"
        } = {}) {
            return new Promise(resolve => {
                showModal({
                    title,
                    message,
                    type,
                    actions: [
                        {
                            text: cancelText,
                            className: "btn-outline",
                            onClick: () => {
                                closeModal();
                                resolve(false);
                            }
                        },
                        {
                            text: confirmText,
                            className: type === "error" ? "btn-danger" : "btn-light",
                            onClick: () => {
                                closeModal();
                                resolve(true);
                            }
                        }
                    ]
                });
            });
        }

        function showToast({
            title = "Notice",
            message = "",
            type = "info",
            duration = 3500
        } = {}) {
            const toast = document.createElement("div");
            toast.className = `toast ${type}`;
            toast.style.setProperty("--toast-duration", `${duration}ms`);

            toast.innerHTML = `
                <div class="toast-icon">${getModalIcon(type)}</div>
                <div class="toast-body">
                    <div class="toast-title">${escapeHtml(title)}</div>
                    <div class="toast-text">${escapeHtml(message)}</div>
                </div>
                <button class="toast-close" aria-label="Close">&times;</button>
            `;

            const bar = toast.querySelector("::after");
            toast.style.setProperty("animation-duration", "0.35s");
            toast.style.setProperty("--duration", `${duration}ms`);
            toast.querySelector(".toast-close").onclick = () => removeToast(toast);

            const styleBar = document.createElement("style");
            styleBar.textContent = `
                .toast:last-child::after { animation-duration: ${duration}ms; }
            `;
            toast.appendChild(styleBar);

            toastWrap.appendChild(toast);

            const timer = setTimeout(() => removeToast(toast), duration);
            toast.dataset.timer = timer;
        }

        function removeToast(toast) {
            if (!toast || !toast.parentNode) return;
            clearTimeout(Number(toast.dataset.timer || 0));
            toast.style.animation = "toastOut 0.28s ease forwards";
            setTimeout(() => {
                if (toast.parentNode) toast.parentNode.removeChild(toast);
            }, 260);
        }

        async function loadQuizzes() {
            showLoading("Loading quizzes...");

            try {
                const result = await apiCall({
                    action: "adminGetQuizzes",
                    token: adminToken
                });

                if (!result.success) {
                    await showAlert({
                        title: "Load Failed",
                        message: result.message || "Unable to load quizzes.",
                        type: "error"
                    });
                    quizList.innerHTML = `<div class="quiz-card">Unable to load quizzes.</div>`;
                    return;
                }

                quizzes = Array.isArray(result.data) ? result.data : [];
                renderQuizList();

                showToast({
                    title: "Loaded",
                    message: "Quizzes loaded successfully.",
                    type: "success",
                    duration: 2200
                });
            } catch (error) {
                console.error(error);
                quizList.innerHTML = `<div class="quiz-card">Connection failed. Check your script URL or server response.</div>`;
                await showAlert({
                    title: "Connection Error",
                    message: error.message || "Server connection failed.",
                    type: "error"
                });
            } finally {
                hideLoading();
            }
        }

        function renderQuizList() {
            if (!quizzes.length) {
                quizList.innerHTML = `<div class="quiz-card">No quizzes found.</div>`;
                return;
            }

            quizList.innerHTML = quizzes.map(quiz => `
                <div class="quiz-card">
                    <div class="quiz-head">
                        <div>
                            <div class="quiz-title">${escapeHtml(quiz.title || "Untitled Quiz")}</div>
                            <div class="quiz-sub">
                                ${escapeHtml(quiz.description || "-")}<br>
                                Status: <b>${escapeHtml(quiz.status || "Draft")}</b> |
                                Quiz ID: <b>${escapeHtml(quiz.quizId || "-")}</b>
                            </div>
                        </div>
                    </div>

                    <div class="quiz-actions">
                        <button class="btn btn-light" onclick="manageQuestions('${escapeJsString(quiz.quizId)}', '${escapeJsString(quiz.title || "")}')">Manage Questions</button>
                        <button class="btn btn-score" onclick="viewAllScores('${escapeJsString(quiz.quizId)}', '${escapeJsString(quiz.title || "")}')">View All Score</button>
                        <button class="btn btn-outline" onclick="toggleQuizStatus('${escapeJsString(quiz.quizId)}', '${escapeJsString(quiz.status || "Draft")}')">
                            ${quiz.status === "Published" ? "Move to Draft" : "Publish Quiz"}
                        </button>
                        <button class="btn btn-danger" onclick="deleteQuiz('${escapeJsString(quiz.quizId)}')">Delete Quiz</button>
                    </div>
                </div>
            `).join("");
        }

        async function createQuiz() {
            const title = document.getElementById("quizTitle").value.trim();
            const description = document.getElementById("quizDescription").value.trim();
            const status = document.getElementById("quizStatus").value;

            if (!title) {
                await showAlert({
                    title: "Missing Title",
                    message: "Please enter quiz title.",
                    type: "warning"
                });
                return;
            }

            showLoading("Creating quiz...");

            try {
                const result = await apiCall({
                    action: "adminCreateQuiz",
                    token: adminToken,
                    title,
                    description,
                    status
                });

                if (result.success) {
                    clearQuizForm();
                    await loadQuizzes();
                    showToast({
                        title: "Success",
                        message: "Quiz created successfully.",
                        type: "success"
                    });
                } else {
                    await showAlert({
                        title: "Create Failed",
                        message: result.message || "Unable to create quiz.",
                        type: "error"
                    });
                }
            } catch (error) {
                console.error(error);
                await showAlert({
                    title: "Connection Error",
                    message: error.message || "Server connection failed.",
                    type: "error"
                });
            } finally {
                hideLoading();
            }
        }

        async function deleteQuiz(quizId) {
            const ok = await showConfirm({
                title: "Delete Quiz",
                message: "Are you sure you want to delete this quiz? This action cannot be undone.",
                confirmText: "Delete",
                cancelText: "Cancel",
                type: "error"
            });

            if (!ok) return;

            showLoading("Deleting quiz...");

            try {
                const result = await apiCall({
                    action: "adminDeleteQuiz",
                    token: adminToken,
                    quizId
                });

                if (result.success) {
                    if (activeQuizId === quizId) {
                        activeQuizId = "";
                        activeQuizTitle = "";
                        questionSection.classList.add("hidden");
                        questionList.innerHTML = "";
                    }

                    scoreSection.classList.add("hidden");
                    scoreList.innerHTML = "";

                    await loadQuizzes();

                    showToast({
                        title: "Deleted",
                        message: "Quiz deleted successfully.",
                        type: "success"
                    });
                } else {
                    await showAlert({
                        title: "Delete Failed",
                        message: result.message || "Unable to delete quiz.",
                        type: "error"
                    });
                }
            } catch (error) {
                console.error(error);
                await showAlert({
                    title: "Connection Error",
                    message: error.message || "Server connection failed.",
                    type: "error"
                });
            } finally {
                hideLoading();
            }
        }

        async function toggleQuizStatus(quizId, currentStatus) {
            const newStatus = currentStatus === "Published" ? "Draft" : "Published";

            showLoading("Updating quiz status...");

            try {
                const result = await apiCall({
                    action: "adminUpdateQuizStatus",
                    token: adminToken,
                    quizId,
                    status: newStatus
                });

                if (result.success) {
                    await loadQuizzes();
                    showToast({
                        title: "Updated",
                        message: `Quiz moved to ${newStatus}.`,
                        type: "success"
                    });
                } else {
                    await showAlert({
                        title: "Update Failed",
                        message: result.message || "Unable to update quiz status.",
                        type: "error"
                    });
                }
            } catch (error) {
                console.error(error);
                await showAlert({
                    title: "Connection Error",
                    message: error.message || "Server connection failed.",
                    type: "error"
                });
            } finally {
                hideLoading();
            }
        }

        async function manageQuestions(quizId, quizTitle) {
            activeQuizId = quizId;
            activeQuizTitle = quizTitle;
            questionSection.classList.remove("hidden");
            scoreSection.classList.add("hidden");
            questionSectionTitle.textContent = "Manage Questions - " + quizTitle;

            showLoading("Loading quiz questions...");

            try {
                const result = await apiCall({
                    action: "adminGetQuizQuestions",
                    token: adminToken,
                    quizId
                });

                if (result.success) {
                    renderQuestions(Array.isArray(result.data) ? result.data : []);
                    showToast({
                        title: "Ready",
                        message: `Questions loaded for "${quizTitle}".`,
                        type: "info",
                        duration: 2200
                    });
                } else {
                    await showAlert({
                        title: "Load Failed",
                        message: result.message || "Unable to load questions.",
                        type: "error"
                    });
                }
            } catch (error) {
                console.error(error);
                await showAlert({
                    title: "Connection Error",
                    message: error.message || "Server connection failed.",
                    type: "error"
                });
            } finally {
                hideLoading();
            }
        }

        async function viewAllScores(quizId, quizTitle) {
            questionSection.classList.add("hidden");
            scoreSection.classList.remove("hidden");
            scoreSectionTitle.textContent = "Quiz Scores - " + quizTitle;

            showLoading("Loading scores...");

            try {
                const result = await apiCall({
                    action: "adminGetQuizResults",
                    token: adminToken,
                    quizId
                });

                if (result.success) {
                    renderScores(Array.isArray(result.data) ? result.data : []);
                    showToast({
                        title: "Scores Loaded",
                        message: `Showing results for "${quizTitle}".`,
                        type: "info",
                        duration: 2200
                    });
                } else {
                    await showAlert({
                        title: "Load Failed",
                        message: result.message || "Unable to load scores.",
                        type: "error"
                    });
                }
            } catch (error) {
                console.error(error);
                await showAlert({
                    title: "Connection Error",
                    message: error.message || "Server connection failed.",
                    type: "error"
                });
            } finally {
                hideLoading();
            }
        }

        function renderScores(scores) {
            if (!scores.length) {
                scoreList.innerHTML = `<div class="score-card">No results found for this quiz.</div>`;
                return;
            }

            scoreList.innerHTML = scores.map((row, index) => `
                <div class="score-card">
                    <div class="score-head">
                        <div class="score-title">Result ${index + 1}</div>
                    </div>
                    <div class="score-meta">
                        Username: <b>${escapeHtml(row.username || "-")}</b><br>
                        Partner ID: <b>${escapeHtml(row.partnerId || "-")}</b><br>
                        Quiz Title: <b>${escapeHtml(row.quizTitle || "-")}</b><br>
                        Score: <b>${escapeHtml(row.score ?? 0)} / ${escapeHtml(row.total ?? 0)}</b><br>
                        Quiz Done: <b>${row.quizDone ? "Yes" : "No"}</b><br>
                        Submitted At: <b>${escapeHtml(row.submittedAt || "-")}</b>
                    </div>
                </div>
            `).join("");
        }

        function renderQuestions(questions) {
            if (!questions.length) {
                questionList.innerHTML = "";
                addQuestion();
                return;
            }

            questionList.innerHTML = questions.map((q, index) => createQuestionHtml(index + 1, q)).join("");
        }

        function createQuestionHtml(number, q = {}) {
            const correctAnswers = Array.isArray(q.correctAnswers)
                ? q.correctAnswers.map(String)
                : (q.correctAnswer ? [String(q.correctAnswer)] : []);

            return `
                <div class="question-card">
                    <div class="question-head">
                        <div class="question-number">Question ${number}</div>
                        <button class="btn btn-danger" type="button" onclick="removeQuestion(this)">Remove</button>
                    </div>

                    <div class="question-grid">
                        <div class="full">
                            <label>Question</label>
                            <textarea class="q-question" placeholder="Enter question">${escapeHtml(q.question || "")}</textarea>
                        </div>

                        <div class="full">
                            <label>Option 1</label>
                            <div class="option-row">
                                <input type="text" class="q-option1" value="${escapeHtml(q.option1 || "")}" placeholder="Enter option 1">
                                <label class="check-wrap">
                                    <input type="checkbox" class="q-correct-option option-check" value="1" ${correctAnswers.includes("1") ? "checked" : ""}>
                                    Correct
                                </label>
                            </div>
                        </div>

                        <div class="full">
                            <label>Option 2</label>
                            <div class="option-row">
                                <input type="text" class="q-option2" value="${escapeHtml(q.option2 || "")}" placeholder="Enter option 2">
                                <label class="check-wrap">
                                    <input type="checkbox" class="q-correct-option option-check" value="2" ${correctAnswers.includes("2") ? "checked" : ""}>
                                    Correct
                                </label>
                            </div>
                        </div>

                        <div class="full">
                            <label>Option 3</label>
                            <div class="option-row">
                                <input type="text" class="q-option3" value="${escapeHtml(q.option3 || "")}" placeholder="Enter option 3">
                                <label class="check-wrap">
                                    <input type="checkbox" class="q-correct-option option-check" value="3" ${correctAnswers.includes("3") ? "checked" : ""}>
                                    Correct
                                </label>
                            </div>
                        </div>

                        <div class="full">
                            <label>Option 4</label>
                            <div class="option-row">
                                <input type="text" class="q-option4" value="${escapeHtml(q.option4 || "")}" placeholder="Enter option 4 (optional)">
                                <label class="check-wrap">
                                    <input type="checkbox" class="q-correct-option option-check" value="4" ${correctAnswers.includes("4") ? "checked" : ""}>
                                    Correct
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function addQuestion() {
            const number = questionList.children.length + 1;
            questionList.insertAdjacentHTML("beforeend", createQuestionHtml(number));
        }

        function removeQuestion(button) {
            const card = button.closest(".question-card");
            if (card) {
                card.remove();
                reNumberQuestions();
            }
        }

        function reNumberQuestions() {
            [...questionList.children].forEach((card, index) => {
                const title = card.querySelector(".question-number");
                if (title) {
                    title.textContent = "Question " + (index + 1);
                }
            });
        }

        async function saveQuestions() {
            if (!activeQuizId) {
                await showAlert({
                    title: "No Quiz Selected",
                    message: "Please select a quiz first.",
                    type: "warning"
                });
                return;
            }

            const cards = [...document.querySelectorAll(".question-card")];
            const questions = [];

            if (!cards.length) {
                await showAlert({
                    title: "No Questions",
                    message: "Please add at least one question.",
                    type: "warning"
                });
                return;
            }

            for (const card of cards) {
                const question = card.querySelector(".q-question").value.trim();
                const option1 = card.querySelector(".q-option1").value.trim();
                const option2 = card.querySelector(".q-option2").value.trim();
                const option3 = card.querySelector(".q-option3").value.trim();
                const option4 = card.querySelector(".q-option4").value.trim();

                const correctAnswers = [...card.querySelectorAll(".q-correct-option:checked")]
                    .map(cb => cb.value);

                if (!question || !option1 || !option2 || !option3) {
                    await showAlert({
                        title: "Incomplete Question",
                        message: "Please fill all question and required option fields.",
                        type: "warning"
                    });
                    return;
                }

                if (!correctAnswers.length) {
                    await showAlert({
                        title: "Missing Correct Answer",
                        message: "Please tick at least one correct answer.",
                        type: "warning"
                    });
                    return;
                }

                if (correctAnswers.includes("4") && !option4) {
                    await showAlert({
                        title: "Option 4 Missing",
                        message: "You marked option 4 as correct, but option 4 is empty.",
                        type: "warning"
                    });
                    return;
                }

                questions.push({
                    question,
                    option1,
                    option2,
                    option3,
                    option4,
                    correctAnswers
                });
            }

            showLoading("Saving quiz questions...");

            try {
                const result = await apiCall({
                    action: "adminSaveQuizQuestions",
                    token: adminToken,
                    quizId: activeQuizId,
                    questions
                });

                if (result.success) {
                    showToast({
                        title: "Saved",
                        message: "Questions saved successfully.",
                        type: "success"
                    });
                } else {
                    await showAlert({
                        title: "Save Failed",
                        message: result.message || "Unable to save questions.",
                        type: "error"
                    });
                }
            } catch (error) {
                console.error(error);
                await showAlert({
                    title: "Connection Error",
                    message: error.message || "Server connection failed.",
                    type: "error"
                });
            } finally {
                hideLoading();
            }
        }

        async function publishActiveQuiz() {
            if (!activeQuizId) {
                await showAlert({
                    title: "No Quiz Selected",
                    message: "Please select a quiz first.",
                    type: "warning"
                });
                return;
            }

            const cards = [...document.querySelectorAll(".question-card")];
            if (!cards.length) {
                await showAlert({
                    title: "No Questions",
                    message: "Please add and save at least one question before publishing.",
                    type: "warning"
                });
                return;
            }

            showLoading("Publishing quiz...");

            try {
                const result = await apiCall({
                    action: "adminUpdateQuizStatus",
                    token: adminToken,
                    quizId: activeQuizId,
                    status: "Published"
                });

                if (result.success) {
                    await loadQuizzes();
                    showToast({
                        title: "Published",
                        message: "Quiz published successfully.",
                        type: "success"
                    });
                } else {
                    await showAlert({
                        title: "Publish Failed",
                        message: result.message || "Unable to publish quiz.",
                        type: "error"
                    });
                }
            } catch (error) {
                console.error(error);
                await showAlert({
                    title: "Connection Error",
                    message: error.message || "Server connection failed.",
                    type: "error"
                });
            } finally {
                hideLoading();
            }
        }

        modalOverlay.addEventListener("click", (e) => {
            if (e.target === modalOverlay) {
                closeModal();
            }
        });

        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                closeModal();
            }
        });

        if (!adminToken) {
            showAlert({
                title: "Admin Login Required",
                message: "Please login as admin first.",
                type: "warning"
            }).then(() => {
                window.location.href = "admin-panel.html";
            });
        } else {
            sessionStorage.setItem("adminToken", adminToken);
            loadQuizzes();
        }
    </script>
</body>
</html>
