<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Result - Your Strong Ministry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            color: white;
            background: linear-gradient(rgba(8,18,38,0.72), rgba(8,18,38,0.88)), url("https://images.unsplash.com/photo-1504052434569-70ad5836ab65?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
            padding: 18px;
            overflow-x: hidden;
            position: relative;
        }

        .bg-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(95px);
            opacity: 0.22;
            pointer-events: none;
            animation: floatGlow 10s ease-in-out infinite;
            z-index: 0;
        }

            .bg-glow.one {
                width: 260px;
                height: 260px;
                background: rgba(255,255,255,0.20);
                top: 4%;
                left: 4%;
            }

            .bg-glow.two {
                width: 320px;
                height: 320px;
                background: rgba(173,216,255,0.14);
                right: 4%;
                bottom: 4%;
                animation-delay: 2s;
            }

        .page {
            max-width: 860px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            animation: pageEnter 0.8s ease;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .back-link {
            color: white;
            text-decoration: none;
            font-size: 14px;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            transition: transform 0.3s ease, background 0.3s ease;
        }

            .back-link:hover {
                transform: translateY(-2px);
                background: rgba(255,255,255,0.12);
            }

        .top-right {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .user-badge,
        .partner-badge {
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255,255,255,0.10);
            border: 1px solid rgba(255,255,255,0.14);
            font-size: 13px;
            font-weight: bold;
        }

        .glass-card {
            background: rgba(255,255,255,0.11);
            border: 1px solid rgba(255,255,255,0.18);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 18px 45px rgba(0,0,0,0.25);
            position: relative;
            overflow: hidden;
            margin-bottom: 18px;
        }

            .glass-card::before {
                content: "";
                position: absolute;
                width: 220px;
                height: 220px;
                border-radius: 50%;
                background: radial-gradient(rgba(255,255,255,0.10), transparent 70%);
                top: -90px;
                right: -90px;
                pointer-events: none;
            }

        .result-box {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .result-icon {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            background: rgba(255,255,255,0.16);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 34px;
            animation: gentlePulse 1.8s ease-in-out infinite;
        }

        .result-title {
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .result-sub {
            font-size: 14px;
            line-height: 1.7;
            color: rgba(255,255,255,0.86);
            margin-bottom: 18px;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 6px solid rgba(255,255,255,0.18);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            background: rgba(255,255,255,0.08);
            box-shadow: 0 10px 24px rgba(0,0,0,0.18);
        }

        .score-main {
            font-size: 38px;
            font-weight: bold;
            line-height: 1;
        }

        .score-sub {
            font-size: 13px;
            color: rgba(255,255,255,0.80);
            margin-top: 6px;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            margin-top: 18px;
            position: relative;
            z-index: 1;
        }

        .meta-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 18px;
            padding: 18px;
            text-align: center;
        }

        .meta-label {
            font-size: 13px;
            color: rgba(255,255,255,0.72);
            margin-bottom: 8px;
        }

        .meta-value {
            font-size: 22px;
            font-weight: bold;
            word-break: break-word;
        }

        .action-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .action-btn {
            border: none;
            background: linear-gradient(135deg, #ffffff, #e8f1ff);
            color: #16324f;
            padding: 13px 18px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

            .action-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 20px rgba(0,0,0,0.16);
            }

            .action-btn.secondary {
                background: rgba(255,255,255,0.10);
                color: white;
                border: 1px solid rgba(255,255,255,0.18);
            }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(3, 10, 24, 0.62);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s ease;
        }

            .loading-overlay.show {
                opacity: 1;
                visibility: visible;
            }

        .loading-box {
            width: 100%;
            max-width: 360px;
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.18);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 24px;
            padding: 26px 20px;
            text-align: center;
        }

        .loading-spinner {
            width: 68px;
            height: 68px;
            margin: 0 auto 16px;
            position: relative;
        }

        .ring1, .ring2 {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.16);
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        .ring2 {
            inset: 9px;
            animation-direction: reverse;
            animation-duration: 1.4s;
            border-top-color: rgba(173,216,255,0.95);
        }

        .cross {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            animation: gentlePulse 1.6s ease-in-out infinite;
        }

        .loading-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .loading-text {
            font-size: 14px;
            color: rgba(255,255,255,0.88);
            line-height: 1.7;
        }

        @keyframes pageEnter {
            from {
                opacity: 0;
                transform: translateY(24px) scale(0.985);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes floatGlow {
            0%,100% {
                transform: translate(0,0) scale(1);
            }

            50% {
                transform: translate(14px,-18px) scale(1.05);
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes gentlePulse {
            0%,100% {
                transform: scale(1);
                opacity: 0.84;
            }

            50% {
                transform: scale(1.08);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 14px;
            }

            .result-title {
                font-size: 24px;
            }

            .meta-grid {
                grid-template-columns: 1fr;
            }

            .glass-card {
                padding: 18px 14px;
                border-radius: 20px;
            }

            .action-row {
                flex-direction: column;
            }

            .action-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="bg-glow one"></div>
    <div class="bg-glow two"></div>

    <div class="page">
        <div class="topbar">
            <a href="profile.html" class="back-link" id="backToProfile">← Back to Profile</a>

            <div class="top-right">
                <div class="user-badge" id="userBadge">User: -</div>
                <div class="partner-badge" id="partnerBadge">Partner ID: -----</div>
            </div>
        </div>

        <div id="resultContainer">
            <div class="glass-card">
                <div class="result-box">
                    <div class="result-title">Loading Result...</div>
                    <div class="result-sub">Please wait while we load your quiz result.</div>
                </div>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-box">
            <div class="loading-spinner">
                <div class="ring1"></div>
                <div class="ring2"></div>
                <div class="cross">✝</div>
            </div>
            <div class="loading-title">Please Wait</div>
            <div class="loading-text" id="loadingText">Loading result...</div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxCNL-3svzyaA5oQYa36jfJlTwoorHB36DDJmeG2awiwhclEPElAE2iW-kHagBfKj_V-g/exec";

        const params = new URLSearchParams(window.location.search);
        const username = params.get("username") || localStorage.getItem("loggedInUser") || "";
        const quizId = params.get("quizId") || "";
        const partnerIdFromUrl = params.get("partnerId") || "";

        const userBadge = document.getElementById("userBadge");
        const partnerBadge = document.getElementById("partnerBadge");
        const backToProfile = document.getElementById("backToProfile");
        const resultContainer = document.getElementById("resultContainer");
        const loadingOverlay = document.getElementById("loadingOverlay");
        const loadingText = document.getElementById("loadingText");

        let currentPartnerId = partnerIdFromUrl;

        if (username) {
            userBadge.textContent = "User: " + username;
            backToProfile.href = "Profile.html?username=" + encodeURIComponent(username);
        }

        if (currentPartnerId) {
            partnerBadge.textContent = "Partner ID: " + currentPartnerId;
        }

        function showLoading(text = "Please wait...") {
            loadingText.textContent = text;
            loadingOverlay.classList.add("show");
        }

        function hideLoading() {
            loadingOverlay.classList.remove("show");
        }

        async function apiCall(payload) {
            const res = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            return await res.json();
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        async function loadPartnerId() {
            if (!username) return;

            if (currentPartnerId) {
                partnerBadge.textContent = "Partner ID: " + currentPartnerId;
                return;
            }

            try {
                const result = await apiCall({
                    action: "getProfile",
                    username: username
                });

                if (result.success) {
                    currentPartnerId = result.partnerId || "";
                    partnerBadge.textContent = "Partner ID: " + (currentPartnerId || "-----");
                } else {
                    partnerBadge.textContent = "Partner ID: -----";
                }
            } catch (error) {
                console.error(error);
                partnerBadge.textContent = "Partner ID: -----";
            }
        }

        function renderError(message) {
            resultContainer.innerHTML = `
                <div class="glass-card">
                    <div class="result-box">
                        <div class="result-icon">!</div>
                        <div class="result-title">Result Not Available</div>
                        <div class="result-sub">${escapeHtml(message)}</div>
                        <div class="action-row" style="margin-top:18px;">
                            <a class="action-btn secondary" href="profile.html?username=${encodeURIComponent(username)}">Back to Profile</a>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderResult(result) {
            const score = Number(result.score || 0);
            const total = Number(result.total || 0);
            const percent = total > 0 ? Math.round((score / total) * 100) : 0;
            const partnerId = result.partnerId || currentPartnerId || "-----";

            partnerBadge.textContent = "Partner ID: " + partnerId;

            resultContainer.innerHTML = `
                <div class="glass-card">
                    <div class="result-box">
                        <div class="result-icon">✓</div>
                        <div class="result-title">${escapeHtml(result.quizTitle || "Quiz Result")}</div>
                        <div class="result-sub">
                            Your quiz has been submitted successfully.
                        </div>

                        <div class="score-circle">
                            <div class="score-main">${score}/${total}</div>
                            <div class="score-sub">Score</div>
                        </div>
                    </div>

                    <div class="meta-grid">
                        <div class="meta-card">
                            <div class="meta-label">Username</div>
                            <div class="meta-value">${escapeHtml(result.username || username || "-")}</div>
                        </div>

                        <div class="meta-card">
                            <div class="meta-label">Partner ID</div>
                            <div class="meta-value">${escapeHtml(partnerId)}</div>
                        </div>

                        <div class="meta-card">
                            <div class="meta-label">Percentage</div>
                            <div class="meta-value">${percent}%</div>
                        </div>

                        <div class="meta-card">
                            <div class="meta-label">Correct Answers</div>
                            <div class="meta-value">${score}</div>
                        </div>

                        <div class="meta-card">
                            <div class="meta-label">Total Questions</div>
                            <div class="meta-value">${total}</div>
                        </div>

                        <div class="meta-card">
                            <div class="meta-label">Quiz Done</div>
                            <div class="meta-value">${result.quizDone ? "Yes" : "Yes"}</div>
                        </div>
                    </div>
                </div>

                <div class="glass-card">
                    <div class="action-row">
                        <a class="action-btn secondary" href="profile.html?username=${encodeURIComponent(username)}">Back to Profile</a>
                        <a class="action-btn" href="quiz.html?username=${encodeURIComponent(username)}">Go to Quiz Page</a>
                    </div>
                </div>
            `;
        }

        async function loadResult() {
            if (!username || !quizId) {
                renderError("Missing username or quiz ID.");
                return;
            }

            showLoading("Loading result...");

            try {
                const result = await apiCall({
                    action: "getQuizResult",
                    username: username,
                    quizId: quizId
                });

                if (result.success && result.result) {
                    renderResult(result.result);
                } else {
                    renderError(result.message || "Result not found.");
                }
            } catch (error) {
                console.error(error);
                renderError("Server connection failed.");
            } finally {
                hideLoading();
            }
        }

        async function init() {
            await loadPartnerId();
            await loadResult();
        }

        init();
    </script>
</body>
</html>
